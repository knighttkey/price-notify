<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>嘉義飯店監測控制台</title>
    <style>
      :root {
        --primary: #6366f1;
        --bg: #0f172a;
        --card: rgba(30, 41, 59, 0.9);
        --text: #f8fafc;
        --accent: #22d3ee;
        --success: #10b981;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        max-width: 600px;
        width: 100%;
      }

      header {
        text-align: center;
        margin: 2rem 0;
      }

      h1 {
        font-size: 1.5rem;
        background: linear-gradient(to right, var(--primary), var(--accent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0;
      }

      .status-badge {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 99px;
        font-size: 0.75rem;
        background: rgba(16, 185, 129, 0.2);
        color: var(--success);
        margin-top: 0.5rem;
      }

      .card {
        background: var(--card);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        padding: 1.5rem;
        margin-bottom: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      }

      label {
        display: block;
        font-size: 0.8rem;
        color: #94a3b8;
        margin-bottom: 0.5rem;
      }

      input,
      textarea {
        width: 100%;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        padding: 0.8rem;
        color: white;
        font-size: 0.9rem;
        box-sizing: border-box;
        margin-bottom: 1rem;
      }

      .btn {
        width: 100%;
        padding: 1rem;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.5rem;
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn-outline {
        background: transparent;
        border: 1px solid var(--primary);
        color: var(--primary);
      }

      .hotel-item {
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding: 1rem 0;
      }

      .hotel-item:last-child {
        border: none;
      }
      .hotel-name {
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .hotel-meta {
        font-size: 0.85rem;
        color: #94a3b8;
        display: flex;
        gap: 1rem;
      }
      .hotel-link {
        color: var(--accent);
        text-decoration: none;
        font-size: 0.85rem;
        margin-top: 0.5rem;
        display: inline-block;
      }

      .update-time {
        font-size: 0.7rem;
        color: #64748b;
        text-align: center;
        margin-bottom: 1rem;
      }

      #resultsList:empty::after {
        content: "暫無搜尋結果，請點擊下方按鈕啟動掃描。";
        display: block;
        text-align: center;
        color: #64748b;
        padding: 2rem 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>嘉義飯店監測控制台</h1>
        <div class="status-badge">● 雲端監控中 (每小時)</div>
      </header>

      <div class="card">
        <h3 style="margin-top: 0">📡 最新掃描結果</h3>
        <div id="updateTime" class="update-time">讀取中...</div>
        <div id="resultsList"></div>
      </div>

      <div class="card">
        <h3>⚙️ 修改條件</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem">
          <div>
            <label>預算上限</label>
            <input type="number" id="maxPrice" value="2800" />
          </div>
          <div>
            <label>最低星級</label>
            <input type="number" step="0.1" id="minRating" value="3.5" />
          </div>
        </div>
        <label>指定飯店 (每行一間)</label>
        <textarea id="watchList" rows="4">
嘉義智選假日酒店
耐斯王子大飯店
兆品酒店嘉義
嘉義亮點旅店
承億文旅嘉義商旅
承億文旅桃城茶樣子
蘭桂坊花園酒店
天成文旅-繪日之丘
嘉義大雅旅店
嘉義皇品國際酒店
嘉義觀止飯店
葉綠宿・漫漫回嘉 Home Way Hotel 嘉義館</textarea
        >
        <button class="btn" onclick="copyAndGo()">
          生成並更新設定 (config.json)
        </button>
      </div>

      <div class="card" style="background: rgba(99, 102, 241, 0.1)">
        <h3>⚡️ 立即執行掃描</h3>
        <p style="font-size: 0.85rem; color: #94a3b8">
          雲端伺服器每小時會自動抓取一次。若你要現在立即查詢：
        </p>
        <a
          href="https://github.com/knighttkey/price-notify/actions/workflows/hotel_monitor.yml"
          class="btn btn-outline"
          target="_blank"
        >
          前往 Actions 點擊 Run Workflow
        </a>
      </div>
    </div>

    <script>
      const user = "knighttkey";
      const repo = "price-notify";

      // 載入結果
      async function fetchResults() {
        try {
          const res = await fetch(
            `https://raw.githubusercontent.com/${user}/${repo}/main/results.json?t=${Date.now()}`,
          );
          if (!res.ok) return;
          const data = await res.json();

          document.getElementById("updateTime").textContent =
            `最後更新時間：${data.last_updated}`;
          const list = document.getElementById("resultsList");
          list.innerHTML = "";

          if (data.hotels && data.hotels.length > 0) {
            data.hotels.forEach((h) => {
              const div = document.createElement("div");
              div.className = "hotel-item";
              div.innerHTML = `
                        <div class="hotel-name">${h.name}</div>
                        <div class="hotel-meta">
                            <span>💰 $${h.price}</span>
                            <span>⭐ ${h.rating}</span>
                        </div>
                        <a href="${h.url}" class="hotel-link" target="_blank">查看房源 →</a>
                    `;
              list.appendChild(div);
            });
          }
        } catch (e) {
          console.error("載入結果失敗", e);
        }
      }

      // 複製並跳轉
      function copyAndGo() {
        const config = {
          CHECK_IN: "2026-03-14",
          CHECK_OUT: "2026-03-15",
          MAX_PRICE: parseInt(document.getElementById("maxPrice").value),
          MIN_RATING: parseFloat(document.getElementById("minRating").value),
          HOTELS_TO_WATCH: document
            .getElementById("watchList")
            .value.split("\n")
            .filter((s) => s.trim()),
          BLACKLIST: [
            "金龍海悅飯店",
            "仲青行旅嘉義館",
            "LIGHT HOSTEL",
            "風箏旅人旅社",
          ],
          STOP_DATE: "2026-03-12",
        };

        const jsonStr = JSON.stringify(config, null, 2);
        navigator.clipboard.writeText(jsonStr).then(() => {
          alert("JSON 設定已複製！即將前往編輯頁面，請貼上並儲存。");
          window.open(
            `https://github.com/${user}/${repo}/edit/main/config.json`,
            "_blank",
          );
        });
      }

      fetchResults();
    </script>
  </body>
</html>
