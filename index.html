<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>嘉義飯店監測控制台</title>
    <style>
      :root {
        --primary: #6366f1;
        --bg: #0f172a;
        --card: rgba(30, 41, 59, 0.9);
        --text: #f8fafc;
        --accent: #22d3ee;
        --success: #10b981;
      }

      body {
        font-family: -apple-system, system-ui, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        max-width: 500px;
        width: 100%;
      }

      header {
        text-align: center;
        margin: 12px 0;
      }

      h1 {
        font-size: 1.2rem;
        margin: 0;
      }

      .status-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.7rem;
        background: rgba(16, 185, 129, 0.1);
        color: var(--success);
        border: 1px solid rgba(16, 185, 129, 0.2);
        margin-top: 4px;
      }

      .card {
        background: var(--card);
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      h3 {
        margin: 0 0 8px 0;
        font-size: 1rem;
        color: var(--accent);
      }

      label {
        display: block;
        font-size: 0.75rem;
        color: #94a3b8;
        margin-bottom: 4px;
      }

      input,
      textarea {
        width: 100%;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        padding: 8px;
        color: white;
        font-size: 0.9rem;
        box-sizing: border-box;
        margin-bottom: 8px;
      }

      .btn {
        width: 100%;
        padding: 10px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 0.9rem;
      }

      .btn:disabled {
        background: #475569;
        cursor: not-allowed;
      }

      .btn-outline {
        background: transparent;
        border: 1px solid var(--primary);
        color: var(--primary);
      }

      .hotel-item {
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding: 8px 0;
      }

      .hotel-item:last-child {
        border: none;
      }
      .hotel-name {
        font-weight: 600;
        font-size: 0.95rem;
        margin-bottom: 2px;
      }
      .hotel-meta {
        font-size: 0.8rem;
        color: #94a3b8;
        display: flex;
        gap: 12px;
      }
      .hotel-link {
        color: var(--accent);
        text-decoration: underline;
        font-size: 0.8rem;
        margin-top: 4px;
        display: inline-block;
      }

      .update-time {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        margin-bottom: 8px;
      }

      .token-setup {
        background: rgba(239, 68, 68, 0.1);
        border: 1px dashed #ef4444;
        padding: 8px;
        border-radius: 8px;
        margin-bottom: 8px;
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>嘉義飯店監測控制台</h1>
        <div class="status-badge">雲端監控主控室</div>
      </header>

      <div id="tokenPanel" class="card">
        <h3>身分驗證</h3>
        <p style="font-size: 0.7rem; color: #94a3b8; margin: 0 0 8px 0">
          為了手機直接更新，請填入你的 GitHub PAT (僅存在本機瀏覽器)：
        </p>
        <input
          type="password"
          id="githubToken"
          placeholder="ghp_xxxxxxxxxxxx"
          onchange="saveToken()"
        />
        <p style="font-size: 0.65rem; color: #ef4444">
          * 這是必須的，否則無法直接寫入 config.json
        </p>
      </div>

      <div class="card">
        <h3>最新掃描結果</h3>
        <div id="updateTime" class="update-time">讀取中...</div>
        <div id="resultsList"></div>
      </div>

      <div class="card">
        <h3>修改條件</h3>
        <div style="display: flex; gap: 8px">
          <div style="flex: 1">
            <label>預算上限</label>
            <input type="number" id="maxPrice" value="2800" />
          </div>
          <div style="flex: 1">
            <label>最低星級</label>
            <input type="number" step="0.1" id="minRating" value="3.5" />
          </div>
        </div>
        <label>指定飯店 (每行一間)</label>
        <textarea id="watchList" rows="5">
嘉義智選假日酒店
耐斯王子大飯店
兆品酒店嘉義
嘉義亮點旅店
承億文旅嘉義商旅
承億文旅桃城茶樣子
蘭桂坊花園酒店
天成文旅-繪日之丘
嘉義大雅旅店
嘉義皇品國際酒店
嘉義觀止飯店
葉綠宿・漫漫回嘉 Home Way Hotel 嘉義館</textarea
        >
        <button id="saveBtn" class="btn" onclick="directUpdate()">
          儲存並立即生效
        </button>
        <p
          id="saveStatus"
          style="
            font-size: 0.7rem;
            text-align: center;
            margin-top: 8px;
            display: none;
          "
        ></p>
      </div>

      <div class="card" style="background: rgba(99, 102, 241, 0.05)">
        <h3>立即執行掃描</h3>
        <a
          href="https://github.com/knighttkey/price-notify/actions/workflows/hotel_monitor.yml"
          class="btn btn-outline"
          target="_blank"
        >
          前往 Actions 啟動
        </a>
      </div>
    </div>

    <script>
      const user = "knighttkey";
      const repo = "price-notify";
      const filePath = "config.json";

      // 從 localStorage 讀取 Token
      function loadToken() {
        const saved = localStorage.getItem("gh_pat");
        if (saved) document.getElementById("githubToken").value = saved;
      }

      function saveToken() {
        localStorage.setItem(
          "gh_pat",
          document.getElementById("githubToken").value,
        );
      }

      async function fetchResults() {
        try {
          const res = await fetch(
            `https://raw.githubusercontent.com/${user}/${repo}/main/results.json?t=${Date.now()}`,
          );
          if (!res.ok) return;
          const data = await res.json();
          document.getElementById("updateTime").textContent =
            `最後更新時間：${data.last_updated}`;
          const list = document.getElementById("resultsList");
          list.innerHTML = "";

          if (data.hotels && data.hotels.length > 0) {
            data.hotels.forEach((h) => {
              const div = document.createElement("div");
              div.className = "hotel-item";
              div.innerHTML = `
                        <div class="hotel-name">${h.name}</div>
                        <div class="hotel-meta"><span>價格: $${h.price}</span><span>星級: ${h.rating}</span></div>
                        <a href="${h.url}" class="hotel-link" target="_blank">點此查看房源</a>
                    `;
              list.appendChild(div);
            });
          }
        } catch (e) {
          console.error("載入結果失敗", e);
        }
      }

      async function directUpdate() {
        const token = document.getElementById("githubToken").value;
        const status = document.getElementById("saveStatus");
        const btn = document.getElementById("saveBtn");

        if (!token) {
          alert("請先填入 GitHub Token！");
          return;
        }

        btn.disabled = true;
        status.style.display = "block";
        status.textContent = "正在通訊中...";
        status.style.color = "#94a3b8";

        try {
          // 1. 取得檔案目前狀態 (需要 SHA 來更新)
          const getRes = await fetch(
            `https://api.github.com/repos/${user}/${repo}/contents/${filePath}`,
            {
              headers: { Authorization: `token ${token}` },
            },
          );

          if (!getRes.ok)
            throw new Error(
              "無法取得檔案資訊，請檢查 Token 是否正確或具備 Repo 權限。",
            );
          const fileData = await getRes.json();
          const sha = fileData.sha;

          // 2. 組合新內容
          const config = {
            CHECK_IN: "2026-03-14",
            CHECK_OUT: "2026-03-15",
            MAX_PRICE: parseInt(document.getElementById("maxPrice").value),
            MIN_RATING: parseFloat(document.getElementById("minRating").value),
            HOTELS_TO_WATCH: document
              .getElementById("watchList")
              .value.split("\n")
              .filter((s) => s.trim()),
            BLACKLIST: [
              "金龍海悅飯店",
              "仲青行旅嘉義館",
              "LIGHT HOSTEL",
              "風箏旅人旅社",
            ],
            STOP_DATE: "2026-03-12",
          };

          // 3. 執行更新
          const putRes = await fetch(
            `https://api.github.com/repos/${user}/${repo}/contents/${filePath}`,
            {
              method: "PUT",
              headers: {
                Authorization: `token ${token}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                message: "web: update config from dashboard",
                content: btoa(
                  unescape(encodeURIComponent(JSON.stringify(config, null, 2))),
                ),
                sha: sha,
              }),
            },
          );

          if (putRes.ok) {
            status.textContent = "成功生效！雲端已更新。";
            status.style.color = varValue("--success");
            alert("設定已直接寫入雲端！");
          } else {
            throw new Error("更新失敗，請檢查 Token 權限。");
          }
        } catch (e) {
          status.textContent = "出錯了: " + e.message;
          status.style.color = "#ef4444";
          console.error(e);
        } finally {
          btn.disabled = false;
        }
      }

      function varValue(name) {
        return getComputedStyle(document.documentElement)
          .getPropertyValue(name)
          .trim();
      }

      loadToken();
      fetchResults();
    </script>
  </body>
</html>
