<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>嘉義飯店監測控制台</title>
    <style>
      :root {
        --primary: #6366f1;
        --bg: #0f172a;
        --card: rgba(30, 41, 59, 0.9);
        --text: #f8fafc;
        --accent: #22d3ee;
        --success: #10b981;
      }

      * {
        box-sizing: border-box; /* 全局修正破版問題 */
      }

      body {
        font-family: -apple-system, system-ui, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 4px; /* 縮小邊距 */
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        max-width: 480px;
        width: 100%;
      }

      header {
        text-align: center;
        margin: 8px 0;
      }

      h1 {
        font-size: 1.1rem;
        margin: 0;
      }

      .status-badge {
        display: inline-block;
        padding: 1px 6px;
        border-radius: 3px;
        font-size: 0.65rem;
        background: rgba(16, 185, 129, 0.1);
        color: var(--success);
        border: 1px solid rgba(16, 185, 129, 0.2);
        margin-top: 2px;
      }

      .card {
        background: var(--card);
        border-radius: 8px;
        padding: 8px; /* 縮小卡片內邊距 */
        margin-bottom: 6px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      h3 {
        margin: 0 0 6px 0;
        font-size: 0.9rem;
        color: var(--accent);
      }

      label {
        display: block;
        font-size: 0.7rem;
        color: #94a3b8;
        margin-bottom: 2px;
      }

      input,
      textarea {
        width: 100%;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        padding: 6px;
        color: white;
        font-size: 0.85rem;
        margin-bottom: 6px;
      }

      .btn {
        width: 100%;
        padding: 8px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 0.85rem;
      }

      .btn:disabled {
        background: #475569;
        cursor: not-allowed;
      }

      .btn-outline {
        background: transparent;
        border: 1px solid var(--primary);
        color: var(--primary);
      }

      .hotel-item {
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding: 6px 0;
      }

      .hotel-item:last-child {
        border: none;
      }
      .hotel-name {
        font-weight: 600;
        font-size: 0.9rem;
        margin-bottom: 1px;
      }
      .hotel-meta {
        font-size: 0.75rem;
        color: #94a3b8;
        display: flex;
        gap: 8px;
      }
      .hotel-link {
        color: var(--accent);
        text-decoration: underline;
        font-size: 0.75rem;
        margin-top: 2px;
        display: inline-block;
      }

      .update-time {
        font-size: 0.6rem;
        color: #64748b;
        text-align: center;
        margin-bottom: 4px;
      }

      .save-status {
        font-size: 0.65rem;
        text-align: center;
        margin-top: 4px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>嘉義飯店監測控制台</h1>
        <div class="status-badge">雲端監控主控室</div>
      </header>

      <div class="card">
        <h3>最新掃描結果</h3>
        <div id="updateTime" class="update-time">讀取中...</div>
        <div id="resultsList"></div>
      </div>

      <div class="card">
        <h3>修改條件</h3>
        <div style="display: flex; gap: 6px">
          <div style="flex: 1">
            <label>預算上限</label>
            <input type="number" id="maxPrice" value="2800" />
          </div>
          <div style="flex: 1">
            <label>最低星級</label>
            <input type="number" step="0.1" id="minRating" value="3.5" />
          </div>
        </div>
        <label>指定飯店 (每行一間)</label>
        <textarea id="watchList" rows="5">
嘉義智選假日酒店
耐斯王子大飯店
兆品酒店嘉義
嘉義亮點旅店
承億文旅嘉義商旅
承億文旅桃城茶樣子
蘭桂坊花園酒店
天成文旅-繪日之丘
嘉義大雅旅店
嘉義皇品國際酒店
嘉義觀止飯店
葉綠宿・漫漫回嘉 Home Way Hotel 嘉義館</textarea
        >
        <button id="saveBtn" class="btn" onclick="directUpdate()">
          儲存並生效
        </button>
        <p id="saveStatus" class="save-status"></p>

        <!-- 身分設定隱藏區 -->
        <div
          style="
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 8px;
            padding-top: 8px;
          "
        >
          <details>
            <summary
              style="font-size: 0.65rem; color: #64748b; cursor: pointer"
            >
              進階：身分驗證設定 (初次使用請填寫)
            </summary>
            <div style="padding-top: 6px">
              <input
                type="password"
                id="githubToken"
                placeholder="此處輸入 ghp_..."
                onchange="saveToken()"
                style="margin-bottom: 0"
              />
              <p style="font-size: 0.6rem; color: #94a3b8; margin: 4px 0 0 0">
                Token 僅存於您設備的瀏覽器，絕對無法寫入網頁程式碼中以確保安全。
              </p>
            </div>
          </details>
        </div>
      </div>

      <div class="card" style="background: rgba(99, 102, 241, 0.05)">
        <h3>立即巡邏</h3>
        <a
          href="https://github.com/knighttkey/price-notify/actions/workflows/hotel_monitor.yml"
          class="btn btn-outline"
          target="_blank"
        >
          前往 Actions 啟動
        </a>
      </div>
    </div>

    <script>
      const user = "knighttkey";
      const repo = "price-notify";
      const filePath = "config.json";

      function loadToken() {
        const saved = localStorage.getItem("gh_pat");
        if (saved) document.getElementById("githubToken").value = saved;
      }

      function saveToken() {
        localStorage.setItem(
          "gh_pat",
          document.getElementById("githubToken").value,
        );
      }

      async function fetchResults() {
        try {
          const res = await fetch(
            `https://raw.githubusercontent.com/${user}/${repo}/main/results.json?t=${Date.now()}`,
          );
          if (!res.ok) return;
          const data = await res.json();
          document.getElementById("updateTime").textContent =
            `最後更新：${data.last_updated}`;
          const list = document.getElementById("resultsList");
          list.innerHTML = "";

          if (data.hotels && data.hotels.length > 0) {
            data.hotels.forEach((h) => {
              const div = document.createElement("div");
              div.className = "hotel-item";
              div.innerHTML = `
                        <div class="hotel-name">${h.name}</div>
                        <div class="hotel-meta"><span>價格: $${h.price}</span><span>星級: ${h.rating}</span></div>
                        <a href="${h.url}" class="hotel-link" target="_blank">查看房源</a>
                    `;
              list.appendChild(div);
            });
          }
        } catch (e) {
          console.error("載入結果失敗", e);
        }
      }

      async function directUpdate() {
        const token = document.getElementById("githubToken").value;
        const status = document.getElementById("saveStatus");
        const btn = document.getElementById("saveBtn");

        if (!token) {
          alert("請先點開下方的「進階：身分驗證設定」並填入你的 Token！");
          return;
        }

        btn.disabled = true;
        status.style.display = "block";
        status.textContent = "更新中...";
        status.style.color = "#94a3b8";

        try {
          const getRes = await fetch(
            `https://api.github.com/repos/${user}/${repo}/contents/${filePath}`,
            {
              headers: { Authorization: `token ${token}` },
            },
          );

          if (!getRes.ok) throw new Error("Token 有誤或無權限。");
          const fileData = await getRes.json();
          const sha = fileData.sha;

          const configContent = {
            CHECK_IN: "2026-03-14",
            CHECK_OUT: "2026-03-15",
            MAX_PRICE: parseInt(document.getElementById("maxPrice").value),
            MIN_RATING: parseFloat(document.getElementById("minRating").value),
            HOTELS_TO_WATCH: document
              .getElementById("watchList")
              .value.split("\n")
              .filter((s) => s.trim()),
            BLACKLIST: [
              "金龍海悅飯店",
              "仲青行旅嘉義館",
              "LIGHT HOSTEL",
              "風箏旅人旅社",
            ],
            STOP_DATE: "2026-03-12",
          };

          const putRes = await fetch(
            `https://api.github.com/repos/${user}/${repo}/contents/${filePath}`,
            {
              method: "PUT",
              headers: {
                Authorization: `token ${token}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                message: "web: update config",
                content: btoa(
                  unescape(
                    encodeURIComponent(JSON.stringify(configContent, null, 2)),
                  ),
                ),
                sha: sha,
              }),
            },
          );

          if (putRes.ok) {
            status.textContent = "成功！設定已更新。";
            status.style.color = "#10b981";
            alert("設定已儲存！");
          } else {
            throw new Error("存取遭拒。");
          }
        } catch (e) {
          status.textContent = "失敗: " + e.message;
          status.style.color = "#ef4444";
        } finally {
          btn.disabled = false;
        }
      }

      loadToken();
      fetchResults();
    </script>
  </body>
</html>
