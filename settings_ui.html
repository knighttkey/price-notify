<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotel Monitor Settings</title>
    <style>
      :root {
        --primary: #6366f1;
        --bg: #0f172a;
        --card: rgba(30, 41, 59, 0.7);
        --text: #f8fafc;
        --accent: #22d3ee;
      }

      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 2rem;
        display: flex;
        justify-content: center;
      }

      .container {
        max-width: 800px;
        width: 100%;
        background: var(--card);
        backdrop-filter: blur(10px);
        border-radius: 24px;
        padding: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(to right, var(--primary), var(--accent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 2rem;
        text-align: center;
      }

      .section {
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        font-size: 0.875rem;
        margin-bottom: 0.5rem;
        color: #94a3b8;
      }

      input,
      textarea {
        width: 100%;
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 0.75rem;
        color: white;
        font-size: 1rem;
        box-sizing: border-box;
        transition: all 0.2s;
      }

      input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      .button-group {
        margin-top: 2rem;
        display: flex;
        gap: 1rem;
      }

      button {
        flex: 1;
        padding: 1rem;
        border-radius: 14px;
        border: none;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .btn-primary:hover {
        opacity: 0.9;
        transform: translateY(-2px);
      }

      .result-box {
        margin-top: 2rem;
        background: #000;
        padding: 1rem;
        border-radius: 12px;
        font-family: monospace;
        white-space: pre-wrap;
        display: none;
        border: 1px solid var(--primary);
      }

      .copy-hint {
        color: var(--accent);
        font-size: 0.8rem;
        margin-top: 0.5rem;
        cursor: pointer;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Hotel Monitor Dashboard</h1>

      <div class="grid">
        <div class="section">
          <label>入住日期 (Check-in)</label>
          <input type="date" id="checkin" value="2026-03-14" />
        </div>
        <div class="section">
          <label>退房日期 (Check-out)</label>
          <input type="date" id="checkout" value="2026-03-15" />
        </div>
      </div>

      <div class="grid">
        <div class="section">
          <label>價格上限 (TWD)</label>
          <input type="number" id="maxPrice" value="2800" />
        </div>
        <div class="section">
          <label>最低評分 (★)</label>
          <input type="number" step="0.1" id="minRating" value="3.5" />
        </div>
      </div>

      <div class="section">
        <label>指定搜尋飯店 (每行一間)</label>
        <textarea id="watchList" rows="5">
嘉義智選假日酒店
耐斯王子大飯店
兆品酒店嘉義
嘉義亮點旅店
承億文旅嘉義商旅
承億文旅桃城茶樣子
蘭桂坊花園酒店
天成文旅-繪日之丘
嘉義大雅旅店
嘉義皇品國際酒店
嘉義觀止飯店
葉綠宿・漫漫回嘉 Home Way Hotel 嘉義館</textarea
        >
      </div>

      <div class="section">
        <label>黑名單飯店 (每行一間)</label>
        <textarea id="blackList" rows="3">
金龍海悅飯店
仲青行旅嘉義館
LIGHT HOSTEL
風箏旅人旅社</textarea
        >
      </div>

      <div class="section">
        <label>自動停止日期</label>
        <input type="date" id="stopDate" value="2026-03-12" />
      </div>

      <div class="button-group">
        <button class="btn-primary" onclick="generateConfig()">
          產出設定檔 (JSON)
        </button>
      </div>

      <div id="result" class="result-box"></div>
      <div
        id="copyHint"
        class="copy-hint"
        style="display: none"
        onclick="copyResult()"
      >
        點此複製 JSON 並前往 GitHub 更新 config.json
      </div>
    </div>

    <script>
      function generateConfig() {
        const config = {
          CHECK_IN: document.getElementById("checkin").value,
          CHECK_OUT: document.getElementById("checkout").value,
          MAX_PRICE: parseInt(document.getElementById("maxPrice").value),
          MIN_RATING: parseFloat(document.getElementById("minRating").value),
          HOTELS_TO_WATCH: document
            .getElementById("watchList")
            .value.split("\n")
            .filter((s) => s.trim()),
          BLACKLIST: document
            .getElementById("blackList")
            .value.split("\n")
            .filter((s) => s.trim()),
          STOP_DATE: document.getElementById("stopDate").value,
        };

        const resultDiv = document.getElementById("result");
        const jsonStr = JSON.stringify(config, null, 4);
        resultDiv.textContent = jsonStr;
        resultDiv.style.display = "block";
        document.getElementById("copyHint").style.display = "block";
      }

      function copyResult() {
        const text = document.getElementById("result").textContent;
        navigator.clipboard.writeText(text).then(() => {
          alert("JSON 已複製！請前往 GitHub 點擊 config.json 進行編輯貼上。");
          window.open(
            "https://github.com/knighttkey/price-notify/edit/main/config.json",
            "_blank",
          );
        });
      }
    </script>
  </body>
</html>
